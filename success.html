<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Success | Veloura Shoes</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<section class="success-page">

<div class="success-box">

<div class="success-icon">

<i class="fa-solid fa-circle-check"></i>

</div>

<h1>Order Successfully!</h1>

<p>

Thank you for shopping at
<strong>Veloura Shoes</strong>.

</p>

<div class="order-info">

<p>

<b>Nomor Pesanan</b>

<span id="order-id"></span>

</p>

<p>

<b>Tanggal Pemesanan</b>

<span id="order-date"></span>

</p>

<p>

<b>Estimasi Pengiriman</b>

3 - 5 Hari Kerja

</p>

</div>

<div class="success-btn">

<a href="products.html" class="btn">

Lanjut Belanja

</a>

<a href="index.html" class="btn">

Kembali ke Beranda

</a>

</div>

</div>

</section>

<script>

document.getElementById("order-id").innerText =
"#VLR" + Math.floor(Math.random()*900000+100000);

document.getElementById("order-date").innerText =
new Date().toLocaleString("id-ID");

</script>
<script src="js/app.js"></script>

<button id="topBtn">
    <i class="fa-solid fa-arrow-up"></i>
</button>

</body>
</html>
